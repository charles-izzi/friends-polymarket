# https://github.com/firebase/firebase-tools

name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  deploy_hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INTERNAL_POLYMARKET }}
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INTERNAL_POLYMARKET }}
          channelId: live
          projectId: internal-polymarket

  deploy_functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INTERNAL_POLYMARKET }}
      - run: npm --prefix functions ci
      - run: npx firebase-tools deploy --only functions --project internal-polymarket
